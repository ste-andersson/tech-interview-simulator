<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Välj din AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --card-ola: #1a1612;
      --card-sanna: #12181a;
      --card-elin: #121218;
      --accent-ola: #c4863a;
      --accent-sanna: #3ab8c4;
      --accent-elin: #8a6fc4;
      --text: #f0ebe4;
      --muted: #888;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
    }

    header {
      text-align: center;
      padding: 4rem 2rem 2rem;
    }

    header .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    header h1 em {
      font-style: italic;
      font-weight: 400;
    }

    header p {
      margin-top: 1.2rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5px;
      max-width: 1200px;
      margin: 3rem auto 0;
      padding: 0 1.5rem;
    }

    .card {
      position: relative;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transition: transform 0.3s ease;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .card:hover::before { opacity: 1; }
    .card:hover { transform: translateY(-3px); }

    .card-ola { background: var(--card-ola); }
    .card-ola::before { background: linear-gradient(135deg, rgba(196,134,58,0.06) 0%, transparent 60%); }

    .card-sanna { background: var(--card-sanna); }
    .card-sanna::before { background: linear-gradient(135deg, rgba(58,184,196,0.07) 0%, transparent 60%); }

    .card-elin { background: var(--card-elin); }
    .card-elin::before { background: linear-gradient(135deg, rgba(138,111,196,0.07) 0%, transparent 60%); }

    /* Accent bar top */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .card-ola::after { background: var(--accent-ola); }
    .card-sanna::after { background: var(--accent-sanna); }
    .card-elin::after { background: var(--accent-elin); }

    .photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      max-width: 220px;
      margin: 0 auto;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(20%);
      transition: filter 0.4s ease;
    }

    .card:hover .photo-wrap img { filter: grayscale(0%); }

    /* Mood badge */
    .mood {
      position: absolute;
      bottom: -0.5rem;
      right: -0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.6rem;
      font-family: 'DM Mono', monospace;
    }
    .card-ola .mood { background: var(--accent-ola); color: #1a1612; }
    .card-sanna .mood { background: var(--accent-sanna); color: #12181a; }
    .card-elin .mood { background: var(--accent-elin); color: #0e0e12; }

    .card-body {}

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .card-ola .card-name { color: var(--accent-ola); }
    .card-sanna .card-name { color: var(--accent-sanna); }
    .card-elin .card-name { color: var(--accent-elin); }

    .widget-wrap {
      margin-top: 0.5rem;
      min-height: 300px;
    }

    /* Style the elevenlabs widget container */
    elevenlabs-convai {
      display: block;
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #444;
      text-transform: uppercase;
    }

    /* Fade in animation */
    .card {
      animation: fadeUp 0.6s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.25s; }
    .card:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Tech Interview Simulator &mdash; tre olika personligheter</p>
  <h1>Välj din<br><em>intervjuare.</em></h1>
  <p>Simulera en tech-intervju. Starta konversationen direkt.</p>
</header>

<div class="grid">

  <!-- OLA -->
  <div class="card card-ola">
    <div class="photo-wrap">
      <img src="trött-ola.jpg" alt="Ola" />
    </div>
    <div class="card-body">
      <div class="card-name">Ola</div>
    </div>
    <div class="widget-wrap">
      <elevenlabs-convai agent-id="agent_9201kpn9ajpyef7a9k7yqadmr345"></elevenlabs-convai>
    </div>
  </div>

  <!-- SANNA -->
  <div class="card card-sanna">
    <div class="photo-wrap">
      <img src="entusiasm-sanna.png" alt="Sanna" />
    </div>
    <div class="card-body">
      <div class="card-name">Sanna</div>
    </div>
    <div class="widget-wrap">
      <elevenlabs-convai agent-id="agent_8701kpn8b31nfdbtsbc8wss02gfz"></elevenlabs-convai>
    </div>
  </div>

  <!-- ELIN -->
  <div class="card card-elin">
    <div class="photo-wrap">
      <img src="filosofi-elin.jpg" alt="Elin" />
    </div>
    <div class="card-body">
      <div class="card-name">Elin</div>
    </div>
    <div class="widget-wrap">
      <elevenlabs-convai agent-id="agent_5801kpny2m9zf76sse87c5dhcjra"></elevenlabs-convai>
    </div>
  </div>

</div>

<footer>Powered by ElevenLabs Conversational AI</footer>

</body>
</html>
